heading: "Healthcare leader."
aboutImage: /about-ros2.jpeg
paragraph1: "I lead clinical services at ICHS in Seattle — a federally qualified community health center serving 32,000+ patients across 5 sites. My work sits at the intersection of clinical operations, population health, and health equity. I've spent my career building systems that actually reach the people who need them most."
paragraph2: "I'm appointed to the WA Maternal Mortality Review Panel, sit on the board of Mother Africa, and hold a DNP from the University of Washington."
